<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 340" width="160" height="340">
<defs>
  <linearGradient id="gl_igf" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#A8C0CC;stop-opacity:0.52"/>
    <stop offset="7%" style="stop-color:#E6F2F8;stop-opacity:0.88"/>
    <stop offset="18%" style="stop-color:#F6FBFE;stop-opacity:0.58"/>
    <stop offset="50%" style="stop-color:#D8EDF6;stop-opacity:0.42"/>
    <stop offset="82%" style="stop-color:#CCE4F0;stop-opacity:0.52"/>
    <stop offset="93%" style="stop-color:#BCCEE0;stop-opacity:0.78"/>
    <stop offset="100%" style="stop-color:#A0B8C8;stop-opacity:0.52"/>
  </linearGradient>
  <linearGradient id="metalv_igf" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" style="stop-color:#F0F4F5"/>
    <stop offset="25%" style="stop-color:#D8E0E4"/>
    <stop offset="55%" style="stop-color:#A8B4B8"/>
    <stop offset="80%" style="stop-color:#C0CACC"/>
    <stop offset="100%" style="stop-color:#D8E0E2"/>
  </linearGradient>
  
  <linearGradient id="cap_igf" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#7C2D12"/>
    <stop offset="35%" style="stop-color:#C2410C"/>
    <stop offset="70%" style="stop-color:#7C2D12"/>
    <stop offset="100%" style="stop-color:#7C2D12;stop-opacity:0.85"/>
  </linearGradient>
  <filter id="sh_igf">
    <feDropShadow dx="1" dy="4" stdDeviation="6" flood-color="#12202A" flood-opacity="0.15"/>
  </filter>
</defs>

<g filter="url(#sh_igf)">
  <!-- ground shadow -->
  <ellipse cx="80" cy="326" rx="60" ry="6" fill="#12202A" opacity="0.09"/>

  <!-- BODY -->
  <rect x="0" y="96" width="160" height="220" rx="10" fill="url(#gl_igf)"/>
  <rect x="4" y="104" width="152" height="208" fill="#F8C0A0" opacity="0.14"/>
  <rect x="4" y="98" width="13" height="216" rx="6" fill="white" opacity="0.54"/>
  <rect x="20" y="98" width="5" height="216" rx="2" fill="white" opacity="0.18"/>
  <rect x="138" y="98" width="18" height="216" fill="#0A1C28" opacity="0.05"/>

  <!-- LABEL -->
  <rect x="8" y="118" width="144" height="174" rx="3" fill="white" stroke="#D0DCE4" stroke-width="0.6"/>
  <rect x="8" y="118" width="9" height="174" fill="#B4C8D4" opacity="0.11"/>

  <text x="80" y="141" font-family="Georgia,serif" font-size="10" fill="#445566" text-anchor="middle" letter-spacing="0.4">Compounded</text>
  <text x="80" y="163" font-family="Arial,sans-serif" font-size="18" font-weight="700" fill="#0B1E32" text-anchor="middle" letter-spacing="-0.4">IGF-LR3</text>
  <text x="80" y="176" font-family="Georgia,serif" font-size="8.5" fill="#667888" text-anchor="middle" letter-spacing="0.4">Long R3</text>
  <line x1="18" y1="184" x2="142" y2="184" stroke="#D0DCE4" stroke-width="0.5"/>
  <text x="80" y="197" font-family="Arial,sans-serif" font-size="7.5" fill="#8A9BA6" text-anchor="middle" letter-spacing="0.6">MULTI-DOSE VIAL · INJECTABLE</text>

  <!-- MedFit cross icon -->
  <g transform="translate(66,209)">
    <rect x="0" y="9" width="28" height="9" rx="4" fill="#0092CA"/>
    <rect x="9" y="0" width="9" height="28" rx="4" fill="#0092CA"/>
    <rect x="11" y="2" width="5" height="24" rx="2" fill="#00AADE" opacity="0.4"/>
    <rect x="2" y="11" width="24" height="5" rx="2" fill="#00AADE" opacity="0.4"/>
  </g>
  <text x="80" y="256" font-family="Arial,sans-serif" font-size="7" fill="#9AAAB4" text-anchor="middle">MedFit Health</text>
  <text x="80" y="267" font-family="Arial,sans-serif" font-size="6.5" fill="#9AAAB4" text-anchor="middle">200mcg/mL · 5mL</text>

  <!-- Prescription stripe -->
  <rect x="8" y="278" width="144" height="20" rx="0" fill="#0A4A8A"/>
  <rect x="8" y="278" width="9" height="20" fill="#062E5A" opacity="0.4"/>
  <text x="80" y="292" font-family="Arial,sans-serif" font-size="7.5" font-weight="700" fill="white" text-anchor="middle" letter-spacing="1.2">PRESCRIPTION ONLY</text>

  

  <!-- SHOULDER 45deg -->
  <path d="M0,96 L50,66 L110,66 L160,96 Z" fill="url(#gl_igf)"/>
  <path d="M0,96 L50,66 L58,66 L8,96 Z" fill="white" opacity="0.42"/>
  <path d="M152,96 L110,66 L114,66 L160,96 Z" fill="#0A1C28" opacity="0.06"/>

  <!-- NECK 18px -->
  <rect x="50" y="48" width="60" height="20" fill="url(#gl_igf)"/>
  <rect x="52" y="48" width="8" height="20" fill="white" opacity="0.46"/>
  <rect x="100" y="48" width="8" height="20" fill="#0A1C28" opacity="0.06"/>
  <rect x="50" y="64" width="60" height="4" fill="url(#gl_igf)"/>

  <!-- METAL CRIMP 24px tall, 84px wide -->
  <rect x="38" y="22" width="84" height="24" rx="5" fill="url(#metalv_igf)"/>
  <rect x="42" y="23" width="76" height="5" rx="2" fill="white" opacity="0.68"/>
  <rect x="38" y="33" width="84" height="2" fill="#8898A0" opacity="0.28"/>
  <rect x="38" y="38" width="84" height="1.5" fill="#8898A0" opacity="0.18"/>
  <rect x="42" y="43" width="76" height="2" rx="1" fill="#6A7880" opacity="0.25"/>
  <rect x="38" y="22" width="6" height="24" rx="3" fill="#8898A0" opacity="0.3"/>
  <rect x="116" y="22" width="6" height="24" rx="2" fill="#8898A0" opacity="0.3"/>

  <!-- CAP flat 16px, 80px wide -->
  <rect x="40" y="6" width="80" height="16" rx="3" fill="url(#cap_igf)"/>
  <rect x="40" y="6" width="80" height="4" rx="3" fill="white" opacity="0.16"/>
  <rect x="41" y="6" width="11" height="16" rx="2" fill="white" opacity="0.14"/>
  <rect x="40" y="19" width="80" height="3" fill="#060E18" opacity="0.28"/>

  <!-- BOTTOM -->
  <rect x="0" y="308" width="160" height="10" rx="5" fill="url(#gl_igf)" opacity="0.7"/>
  <ellipse cx="80" cy="318" rx="80" ry="7" fill="url(#gl_igf)" opacity="0.4"/>
</g>
</svg>